<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>設備對對碰 - 任天堂競賽版</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');
        
        body {
            font-family: 'Noto Sans TC', sans-serif;
        }

        .preserve-3d { transform-style: preserve-3d; }
        .backface-hidden { backface-visibility: hidden; }
        .rotate-y-180 { transform: rotateY(180deg); }
        .animate-spin-slow { animation: spin 8s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #E60012; border-radius: 10px; }
        
        .nintendo-red { background-color: #E60012; }
        .nintendo-dark { background-color: #2D2D2D; }
        .nintendo-blue { background-color: #00A2E8; }
        .nintendo-yellow { background-color: #FFD900; }
        .nintendo-green { background-color: #43B02A; }
        
        .card-shadow { box-shadow: 0 8px 0 rgba(0,0,0,0.1); }
        .btn-push { transition: transform 0.1s, box-shadow 0.1s; box-shadow: 0 4px 0 rgba(0,0,0,0.2); }
        .btn-push:active { transform: translateY(4px); box-shadow: 0 0 0 rgba(0,0,0,0.2); }
    </style>
</head>
<body class="bg-[#F0F0F0] text-[#2D2D2D]">
    <div id="root"></div>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        // ==========================================
        // Firebase 設定區
        // ==========================================
        const firebaseConfig = {
            apiKey: "AIzaSyAmCOliFc1-qMDVgCGzD33gDCKF8KT1fIo",
            authDomain: "turn-cards-game.firebaseapp.com",
            projectId: "turn-cards-game",
            storageBucket: "turn-cards-game.firebasestorage.app",
            messagingSenderId: "952397521252",
            appId: "1:952397521252:web:51e7af9203ce6d9a235a71"
        };

        const app = firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        const appId = 'turn-cards-game'; 

        const PLACEHOLDER_IMG = "https://via.placeholder.com/400x300?text=Image+Not+Found";

        // --- 子組件定義 ---

        const Icon = ({ name, size = 24, className = "" }) => {
            useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [name]);
            return <i data-lucide={name} style={{ width: size, height: size }} className={`inline-block ${className}`}></i>;
        };

        const MainMenu = ({ playerName, setPlayerName, startGame, leaderboard, setView }) => (
            <div className="flex flex-col items-center justify-center min-h-screen p-4 md:p-6 bg-[#E60012]">
                <div className="bg-white p-6 md:p-10 rounded-[2.5rem] shadow-2xl max-w-lg w-full border-[6px] border-[#2D2D2D]">
                    <div className="text-center mb-6">
                        <div className="inline-flex p-4 bg-[#2D2D2D] rounded-full text-white mb-4 animate-bounce">
                            <Icon name="gamepad-2" size={48} />
                        </div>
                        <h1 className="text-5xl font-black text-[#E60012] tracking-tighter italic uppercase">設備對對碰</h1>
                        <p className="text-[#2D2D2D] font-bold mt-2 text-lg uppercase tracking-widest">Challenge Mode</p>
                    </div>

                    {/* 遊戲說明區塊 */}
                    <div className="mb-6 p-4 bg-amber-50 rounded-2xl border-2 border-amber-200 text-left">
                        <h3 className="flex items-center gap-2 text-amber-700 font-black text-sm mb-2 uppercase italic tracking-wider">
                            <Icon name="info" size={16} /> 遊戲說明 / HOW TO PLAY
                        </h3>
                        <ul className="text-xs font-bold text-amber-800 space-y-1.5 leading-relaxed">
                            <li className="flex gap-2"><span>1.</span> <span>翻開兩張相同卡牌即配對成功，並可查看設備詳細介紹。</span></li>
                            <li className="flex gap-2"><span>2.</span> <span>配對完成後將進入「知識小測驗」，隨機抽取 5 題。</span></li>
                            <li className="flex gap-2"><span>3.</span> <span className="text-red-600 underline">翻牌次數越少、測驗答題越快且準確，總得分越高！</span></li>
                            <li className="flex gap-2"><span>4.</span> <span>難度越高，最後的積分倍率加成也越高。</span></li>
                            <li className="flex gap-2"><span>5.</span> <span className="text-indigo-600">翻牌速度不列入分數計算，遊戲目的在於學習設備知識，勿為得分不看內容就跳出設備介紹。</span></li>
                        </ul>
                    </div>

                    <div className="mb-6 p-6 bg-[#F0F0F0] rounded-3xl border-4 border-dashed border-[#CCCCCC] text-left">
                        <label className="block text-xs font-black text-[#2D2D2D] mb-2 uppercase tracking-tighter">Enter Player Name</label>
                        <input 
                            type="text" 
                            value={playerName} 
                            onChange={e => setPlayerName(e.target.value)}
                            className="w-full p-4 bg-white border-4 border-[#2D2D2D] rounded-2xl outline-none transition-all text-xl font-bold placeholder:text-slate-300"
                            placeholder="輸入名稱 (記錄排行)"
                            autoComplete="off"
                        />
                    </div>

                    <div className="grid grid-cols-1 gap-4 mb-6">
                        <button onClick={() => startGame('easy')} className="flex items-center justify-between p-5 nintendo-green text-white rounded-2xl transition-all border-b-4 border-black/20 btn-push">
                            <span className="font-black text-2xl italic uppercase">Easy (4x4)</span>
                            <Icon name="play-circle" />
                        </button>
                        <button onClick={() => startGame('medium')} className="flex items-center justify-between p-5 nintendo-blue text-white rounded-2xl transition-all border-b-4 border-black/20 btn-push">
                            <span className="font-black text-2xl italic uppercase">Medium (5x5)</span>
                            <Icon name="play-circle" />
                        </button>
                        <button onClick={() => startGame('hard')} className="flex items-center justify-between p-5 nintendo-red text-white rounded-2xl transition-all border-b-4 border-black/20 btn-push">
                            <span className="font-black text-2xl italic uppercase">Hard (6x6)</span>
                            <Icon name="play-circle" />
                        </button>
                    </div>

                    <div className="bg-[#2D2D2D] rounded-3xl p-6 text-white text-left">
                        <h3 className="text-center font-black nintendo-yellow text-[#2D2D2D] inline-block px-4 py-1 rounded-full text-xs mb-4 mx-auto w-full uppercase tracking-widest">Global Ranking</h3>
                        <div className="space-y-3">
                            {leaderboard.map((item, i) => (
                                <div key={i} className="flex items-center justify-between p-3 bg-white/10 rounded-xl hover:bg-white/20 transition-colors border border-white/5">
                                    <div className="flex items-center gap-3">
                                        <span className={`w-6 h-6 flex items-center justify-center rounded-lg text-xs font-black ${i === 0 ? 'bg-[#FFD900] text-[#2D2D2D]' : 'bg-white/20 text-white'}`}>{i+1}</span>
                                        <span className="font-black truncate w-24 md:w-32">{item.name}</span>
                                        <span className={`text-[10px] px-2 py-0.5 rounded font-black uppercase ${item.mode === 'hard' ? 'bg-rose-500' : (item.mode === 'medium' ? 'bg-blue-500' : 'bg-emerald-500')}`}>{item.mode}</span>
                                    </div>
                                    <span className="font-black text-[#FFD900] font-mono">{item.score.toLocaleString()}</span>
                                </div>
                            ))}
                            {leaderboard.length === 0 && <p className="text-center text-white/30 text-xs py-4">Waiting for players...</p>}
                        </div>
                    </div>

                    <button onClick={() => setView('admin_login')} className="mt-8 text-slate-400 hover:text-[#E60012] flex items-center gap-2 text-[10px] mx-auto transition-colors font-bold uppercase tracking-widest" title="Console Manager">
                        <Icon name="cog" size={12} /> Console Settings
                    </button>
                </div>
            </div>
        );

        const GameBoard = ({ difficulty, playerName, setView, gameState, setGameState, handleCardClick, flipCount, startQuiz, isPaused, setIsPaused }) => {
            const gridCols = difficulty === 'easy' ? 'grid-cols-4' : (difficulty === 'medium' ? 'grid-cols-5' : 'grid-cols-6');
            const isGameDone = gameState.matched.length === (difficulty === 'medium' ? 24 : (difficulty === 'easy' ? 16 : 36));
            return (
                <div className="min-h-screen bg-[#2D2D2D] p-4 flex flex-col items-center justify-center">
                    <div className="w-full max-w-2xl flex justify-between items-end mb-6 text-white pt-4">
                        <div className="flex flex-col text-left">
                            <span className="text-xs font-black uppercase text-[#E60012]">Player: {playerName || "Guest"}</span>
                            <div className="flex gap-2 mt-1">
                                <button onClick={() => setView('menu')} className="bg-[#E60012] text-white px-3 py-1 rounded-full text-[10px] font-black hover:bg-[#FF1A1A]">首頁</button>
                                <button onClick={() => setIsPaused(true)} className="bg-slate-600 text-white px-3 py-1 rounded-full text-[10px] font-black hover:bg-slate-500 uppercase tracking-tighter text-center">暫停</button>
                            </div>
                        </div>
                        <div className="text-center">
                            <span className="text-[10px] font-black uppercase block text-white/40 mb-1 tracking-tighter text-center">Matching Progress</span>
                            <h2 className="text-3xl font-black italic">{gameState.matched.length / 2} <span className="text-[#E60012]">/</span> {difficulty === 'easy' ? 8 : (difficulty === 'medium' ? 12 : 18)}</h2>
                        </div>
                        <div className="text-right">
                            <span className="text-[10px] font-black text-white/40 uppercase block mb-1">Turns</span>
                            <span className="text-2xl font-black text-nintendo-yellow font-mono">{flipCount}</span>
                        </div>
                    </div>

                    <div className={`grid ${gridCols} gap-2 md:gap-4 w-full max-w-2xl aspect-square relative`}>
                        {gameState.cards.map((card, idx) => {
                            if (card.isSpacer) return (
                                <div key="spacer" className="bg-[#1A1A1A] rounded-2xl flex items-center justify-center text-[#E60012] border-4 border-[#2D2D2D]">
                                    <Icon name="disc" size={32} className="animate-spin" />
                                </div>
                            );
                            const isFlipped = gameState.flipped.includes(idx) || gameState.matched.includes(idx);
                            return (
                                <div key={card.instanceId} onClick={() => !isPaused && handleCardClick(idx)} className={`relative cursor-pointer transition-all duration-500 preserve-3d h-full ${isFlipped ? 'rotate-y-180' : ''}`}>
                                    <div className="absolute inset-0 backface-hidden bg-[#E60012] rounded-2xl flex items-center justify-center border-4 border-[#FF1A1A] shadow-lg">
                                        <div className="w-12 h-12 rounded-full border-4 border-white/20 flex items-center justify-center">
                                            <div className="w-4 h-4 bg-white/20 rounded-full"></div>
                                        </div>
                                    </div>
                                    <div className="absolute inset-0 backface-hidden rotate-y-180 bg-white rounded-2xl overflow-hidden border-4 border-[#FFF] shadow-xl">
                                        <img src={card.image} className="w-full h-full object-cover" onError={e => e.target.src = PLACEHOLDER_IMG} />
                                        {gameState.matched.includes(idx) && (
                                            <div className="absolute inset-0 bg-emerald-500/20 flex items-center justify-center">
                                                <div className="bg-[#43B02A] text-white rounded-full p-2 shadow-lg scale-110 animate-pulse">
                                                    <Icon name="check" size={24} />
                                                </div>
                                            </div>
                                        )}
                                    </div>
                                </div>
                            );
                        })}
                    </div>

                    {isPaused && (
                        <div className="fixed inset-0 bg-black/80 flex items-center justify-center p-6 z-[60] backdrop-blur-sm">
                            <div className="bg-white rounded-[3rem] p-12 text-center border-[8px] border-[#2D2D2D] shadow-2xl animate-in zoom-in duration-200">
                                <h2 className="text-5xl font-black text-[#E60012] italic mb-8 tracking-tighter uppercase">遊戲暫停</h2>
                                <button 
                                    onClick={() => setIsPaused(false)} 
                                    className="bg-[#2D2D2D] text-white font-black py-6 px-16 rounded-2xl shadow-xl btn-push hover:bg-[#000] text-2xl uppercase italic text-center"
                                >
                                    繼續遊戲
                                </button>
                            </div>
                        </div>
                    )}

                    {gameState.currentMatchInfo && (
                        <div className="fixed inset-0 bg-black/90 flex items-center justify-center p-6 z-50 backdrop-blur-md">
                            <div className="bg-white rounded-[3rem] max-w-md w-full overflow-hidden shadow-2xl text-center animate-in zoom-in duration-300 border-[8px] border-[#2D2D2D]">
                                <div className="relative h-56 w-full text-left">
                                    <img src={gameState.currentMatchInfo.image} className="h-full w-full object-cover" onError={e => e.target.src = PLACEHOLDER_IMG} />
                                    <div className="absolute top-0 left-0 w-full h-full bg-gradient-to-t from-white to-transparent opacity-60"></div>
                                </div>
                                <div className="p-8 text-left">
                                    <span className="bg-[#43B02A] text-white text-[10px] font-black px-3 py-1 rounded-full uppercase mb-2 inline-block">Excellent!</span>
                                    <h3 className="text-3xl font-black mb-4 text-[#E60012] italic uppercase tracking-tighter">{gameState.currentMatchInfo.name}</h3>
                                    <p className="text-[#2D2D2D] font-bold mb-8 leading-relaxed">{gameState.currentMatchInfo.info}</p>
                                    <button onClick={() => setGameState(prev => ({ ...prev, currentMatchInfo: null }))} className="w-full bg-[#2D2D2D] text-white font-black py-5 rounded-2xl shadow-xl btn-push hover:bg-[#000] text-center">繼續翻牌</button>
                                </div>
                            </div>
                        </div>
                    )}
                    {isGameDone && !gameState.currentMatchInfo && (
                        <button onClick={startQuiz} className="mt-8 bg-white text-[#E60012] px-12 py-5 rounded-[2.5rem] font-black text-3xl shadow-2xl animate-bounce border-b-[8px] border-slate-300 hover:translate-y-1 hover:border-b-[4px] transition-all uppercase italic text-center">
                            Start Quiz!
                        </button>
                    )}
                </div>
            );
        };

        const QuizView = ({ quizState, submitQuizAnswer }) => {
            const q = quizState.questions[quizState.currentIndex];
            if(!q) return null;
            return (
                <div className="min-h-screen bg-[#00A2E8] flex items-center justify-center p-4">
                    <div className="bg-white rounded-[3rem] shadow-2xl max-w-xl w-full p-8 md:p-12 relative overflow-hidden border-[8px] border-[#2D2D2D]">
                        <div className="absolute top-0 left-0 h-4 bg-[#FFD900] transition-all duration-500" style={{ width: `${(quizState.currentIndex / 5) * 100}%` }}></div>
                        <div className="flex justify-between items-center mb-10">
                            <span className="bg-[#2D2D2D] text-white px-5 py-1.5 rounded-full text-sm font-black italic">Q {quizState.currentIndex+1} / 5</span>
                            <span className="text-[#E60012] font-black flex items-center gap-2 animate-pulse"><Icon name="timer" size={18} /> SPEED BONUS ACTIVE</span>
                        </div>
                        <h2 className="text-3xl font-black mb-12 text-[#2D2D2D] leading-tight italic uppercase tracking-tighter text-left">
                            {q.question.replace('{name}', q.deviceName)}
                        </h2>
                        <div className="space-y-4 text-left">
                            {q.options.map((opt, i) => (
                                <button key={i} onClick={() => submitQuizAnswer(i)} className="w-full text-left p-6 rounded-3xl border-4 border-[#F0F0F0] hover:border-[#E60012] hover:bg-[#E60012] hover:text-white font-black transition-all text-xl flex items-center justify-between group btn-push shadow-md">
                                    <span>{opt}</span>
                                    <div className="w-8 h-8 rounded-full bg-[#F0F0F0] group-hover:bg-white flex items-center justify-center text-[#2D2D2D] font-black text-sm shrink-0">
                                        {String.fromCharCode(65 + i)}
                                    </div>
                                </button>
                            ))}
                        </div>
                    </div>
                </div>
            );
        };

        const ResultView = ({ finalScore, flipCount, quizState, setView }) => (
            <div className="min-h-screen bg-[#E60012] flex flex-col items-center justify-center p-6 text-center">
                <div className="bg-white rounded-[4rem] shadow-2xl max-w-md w-full p-12 relative border-[10px] border-[#2D2D2D]">
                    <div className="bg-[#FFD900] w-28 h-28 rounded-full flex items-center justify-center mx-auto mb-8 text-[#2D2D2D] rotate-12 shadow-xl border-8 border-white"><Icon name="star" size={64} /></div>
                    <h2 className="text-5xl font-black mb-2 text-[#E60012] italic tracking-tighter uppercase">GAME OVER!</h2>
                    <p className="text-[#2D2D2D] font-black mb-8 uppercase tracking-widest text-sm opacity-50">Score Summary</p>
                    
                    <div className="mb-10 text-center">
                        <div className="text-[100px] leading-none font-black text-[#2D2D2D] drop-shadow-lg tracking-tighter font-mono">{finalScore.toLocaleString()}</div>
                        <p className="text-[#E60012] font-black text-xl uppercase tracking-widest mt-2">Points</p>
                    </div>

                    <div className="grid grid-cols-2 gap-4 mb-12 text-left">
                        <div className="p-4 bg-[#F0F0F0] rounded-3xl border-b-4 border-slate-200 text-center">
                            <span className="text-[#2D2D2D]/40 font-black text-[10px] uppercase block mb-1 text-center">Turns Taken</span>
                            <span className="font-black text-2xl text-[#E60012] font-mono">{flipCount}</span>
                        </div>
                        <div className="p-4 bg-[#F0F0F0] rounded-3xl border-b-4 border-slate-200 text-center">
                            <span className="text-[#2D2D2D]/40 font-black text-[10px] uppercase block mb-1 text-center">Quiz Accuracy</span>
                            <span className="font-black text-2xl text-[#43B02A] font-mono">{quizState.score} / 5</span>
                        </div>
                    </div>

                    <button onClick={() => setView('menu')} className="w-full bg-[#2D2D2D] text-white font-black py-6 rounded-[2rem] shadow-xl hover:bg-[#000] transition-all text-2xl btn-push italic text-center">NEW CHALLENGE</button>
                </div>
            </div>
        );

        const AdminLogin = ({ setView }) => {
            const [creds, setCreds] = useState({ user: '', pass: '' });
            return (
                <div className="min-h-screen flex items-center justify-center p-6 bg-[#2D2D2D]">
                    <form onSubmit={(e) => { e.preventDefault(); if(creds.user==='Admin01' && creds.pass==='76380260') setView('admin'); else alert('Access Denied'); }} className="bg-white p-10 rounded-[3rem] shadow-2xl max-w-sm w-full text-center border-[6px] border-[#E60012]">
                        <h2 className="text-3xl font-black mb-8 text-[#E60012] italic uppercase">System Config</h2>
                        <div className="space-y-4">
                            <input type="text" placeholder="ADMIN ID" className="w-full p-4 border-4 border-[#F0F0F0] rounded-2xl outline-none focus:border-[#E60012]" onChange={e=>setCreds({...creds, user: e.target.value})} />
                            <input type="password" placeholder="PASSWORD" className="w-full p-4 border-4 border-[#F0F0F0] rounded-2xl outline-none focus:border-[#E60012]" onChange={e=>setCreds({...creds, pass: e.target.value})} />
                            <button className="w-full bg-[#E60012] text-white py-4 rounded-2xl font-black btn-push text-center">LOGIN</button>
                            <button type="button" onClick={()=>setView('menu')} className="text-slate-400 font-bold pt-4 hover:text-[#E60012] text-center">CANCEL</button>
                        </div>
                    </form>
                </div>
            );
        };

        const AdminView = ({ cardsData, db, appId, setView }) => {
            const [newItem, setNewItem] = useState({ name:'', image:'', info:'', category:'', question:'請問下列哪一項是關於 {name} 的正確描述？', options:['','','',''], correct:0 });
            const [editingId, setEditingId] = useState(null);
            const [activeCategory, setActiveCategory] = useState('全部');
            const colRef = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('deviceCards');

            // 類別選單 (包含 "全部")
            const categories = useMemo(() => {
                const uniqueCats = Array.from(new Set(cardsData.map(item => item.category || '未分類')));
                return ['全部', ...uniqueCats.sort()];
            }, [cardsData]);

            // 過濾並依照筆畫數排序資料
            const filteredAndSortedData = useMemo(() => {
                let data = activeCategory === '全部' 
                    ? cardsData 
                    : cardsData.filter(item => (item.category || '未分類') === activeCategory);
                
                // 使用 localeCompare 搭配 zh-Hant (繁體中文) 進行筆畫/發音排序
                return [...data].sort((a, b) => a.name.localeCompare(b.name, 'zh-Hant'));
            }, [cardsData, activeCategory]);

            const save = async (e) => {
                e.preventDefault();
                if(editingId) await colRef.doc(editingId).update(newItem);
                else await colRef.add(newItem);
                setNewItem({ name:'', image:'', info:'', category:'', question:'請問下列哪一項是關於 {name} 的正確描述？', options:['','','',''], correct:0 });
                setEditingId(null);
                alert("儲存成功！");
            };

            const handleGit = (val) => {
                let u = val;
                if(u.includes('github.com') && u.includes('/blob/')) u = u.replace('github.com', 'raw.githubusercontent.com').replace('/blob/', '/');
                setNewItem({...newItem, image: u});
            };

            return (
                <div className="p-4 md:p-8 max-w-7xl mx-auto min-h-screen text-left">
                    <div className="flex justify-between items-center mb-8 bg-white p-6 rounded-3xl border-4 border-[#2D2D2D] shadow-lg">
                        <h1 className="text-3xl font-black italic text-[#E60012] uppercase tracking-tighter">Console Manager</h1>
                        <button onClick={()=>setView('menu')} className="bg-[#2D2D2D] text-white px-6 py-2 rounded-xl font-black hover:bg-[#000] text-center">EXIT</button>
                    </div>
                    
                    <div className="grid lg:grid-cols-12 gap-8 text-left items-start">
                        {/* 左側表單 (佔 5 格) */}
                        <div className="lg:col-span-5">
                            <form onSubmit={save} className="bg-white p-8 rounded-[2.5rem] border-4 border-[#2D2D2D] space-y-4 shadow-xl sticky top-8">
                                <h2 className="font-black text-xl text-[#E60012] mb-4 underline decoration-4 uppercase italic">Editor / 題目建立</h2>
                                <div className="grid grid-cols-2 gap-4">
                                    <div className="space-y-1">
                                        <label className="text-[10px] font-black text-slate-400 uppercase">Category / 類別</label>
                                        <input value={newItem.category} placeholder="如: 影像診斷" className="w-full p-4 bg-[#F0F0F0] border-4 border-transparent rounded-2xl focus:border-[#00A2E8] outline-none font-bold" onChange={e=>setNewItem({...newItem, category: e.target.value})} />
                                    </div>
                                    <div className="space-y-1">
                                        <label className="text-[10px] font-black text-slate-400 uppercase">Name / 名稱</label>
                                        <input value={newItem.name} placeholder="設備名稱" className="w-full p-4 bg-[#F0F0F0] border-4 border-transparent rounded-2xl focus:border-[#E60012] outline-none font-bold" onChange={e=>setNewItem({...newItem, name: e.target.value})} />
                                    </div>
                                </div>
                                <div className="space-y-1">
                                    <label className="text-[10px] font-black text-slate-400 uppercase tracking-tighter text-left block">Image / 圖片網址 (自動轉換 Github 連結)</label>
                                    <input value={newItem.image} placeholder="GITHUB IMAGE URL" className="w-full p-4 bg-[#F0F0F0] border-4 border-transparent rounded-2xl focus:border-[#E60012] outline-none font-bold text-xs" onChange={e=>handleGit(e.target.value)} />
                                </div>
                                <div className="space-y-1">
                                    <label className="text-[10px] font-black text-slate-400 uppercase text-left block">Description / 設備介紹</label>
                                    <textarea value={newItem.info} placeholder="設備介紹內容..." className="w-full p-4 bg-[#F0F0F0] border-4 border-transparent rounded-2xl focus:border-[#E60012] outline-none h-24 font-bold" onChange={e=>setNewItem({...newItem, info: e.target.value})} />
                                </div>
                                <div className="p-5 bg-[#2D2D2D] rounded-3xl text-white">
                                    <p className="font-black text-xs mb-3 text-nintendo-yellow uppercase tracking-widest text-left">Quiz / 測驗設定</p>
                                    <input value={newItem.question} className="w-full p-3 mb-4 rounded-xl border-none bg-white/10 outline-none focus:bg-white/20 font-bold" onChange={e=>setNewItem({...newItem, question: e.target.value})} />
                                    {newItem.options.map((o,i)=>(
                                        <div key={i} className="flex gap-3 mb-3 items-center">
                                            <input type="radio" checked={newItem.correct===i} onChange={()=>setNewItem({...newItem, correct: i})} className="accent-nintendo-yellow" />
                                            <input value={o} className="flex-1 p-3 rounded-xl border-none bg-white/10 outline-none text-sm font-bold" placeholder={`Option ${i+1}`} onChange={e=>{
                                                const ns = [...newItem.options]; ns[i]=e.target.value; setNewItem({...newItem, options: ns});
                                            }} />
                                        </div>
                                    ))}
                                </div>
                                <button className="w-full bg-[#E60012] text-white py-5 rounded-3xl font-black text-xl btn-push shadow-lg uppercase tracking-widest text-center italic">
                                    {editingId ? 'Save Update' : 'Add New Data'}
                                </button>
                                {editingId && (
                                    <button type="button" onClick={() => {setEditingId(null); setNewItem({ name:'', image:'', info:'', category:'', question:'請問下列哪一項是關於 {name} 的正確描述？', options:['','','',''], correct:0 });}} className="w-full mt-2 text-slate-400 font-bold text-xs hover:underline text-center">
                                        取消編輯
                                    </button>
                                )}
                            </form>
                        </div>

                        {/* 右側題庫分頁清單 (佔 7 格) */}
                        <div className="lg:col-span-7 space-y-6">
                            <div className="bg-white p-6 rounded-3xl border-4 border-[#2D2D2D] shadow-lg">
                                <h2 className="font-black text-xl text-[#2D2D2D] mb-4 flex items-center justify-between uppercase italic">
                                    <span>Inventory / 歷史題庫</span>
                                    <span className="bg-[#F0F0F0] px-3 py-1 rounded-full text-sm not-italic font-mono">{cardsData.length} Items</span>
                                </h2>
                                
                                {/* 類別切換頁籤 */}
                                <div className="flex flex-wrap gap-2 mb-6 border-b-4 border-[#F0F0F0] pb-4">
                                    {categories.map(cat => (
                                        <button 
                                            key={cat}
                                            onClick={() => setActiveCategory(cat)}
                                            className={`px-4 py-2 rounded-xl font-black text-xs transition-all uppercase italic tracking-tighter border-b-4 ${
                                                activeCategory === cat 
                                                ? 'bg-[#00A2E8] text-white border-black/20 translate-y-0.5' 
                                                : 'bg-[#F0F0F0] text-slate-400 border-transparent hover:bg-slate-200'
                                            }`}
                                        >
                                            {cat}
                                        </button>
                                    ))}
                                </div>

                                {/* 設備清單 (依照筆畫數排序) */}
                                <div className="space-y-4 max-h-[1000px] overflow-y-auto pr-2 custom-scroll">
                                    {filteredAndSortedData.map(item => (
                                        <div key={item.id} className="p-4 bg-[#F9F9F9] border-4 border-[#2D2D2D] rounded-[1.5rem] flex items-center gap-5 shadow-sm group hover:border-[#00A2E8] transition-all">
                                            <img 
                                                src={item.image} 
                                                className="w-20 h-20 rounded-2xl object-cover border-4 border-[#2D2D2D] bg-white flex-shrink-0" 
                                                onError={e=>e.target.src=PLACEHOLDER_IMG} 
                                            />
                                            <div className="flex-1 min-w-0">
                                                <span className="text-[10px] font-black text-[#00A2E8] uppercase tracking-tighter italic">
                                                    {item.category || '未分類'}
                                                </span>
                                                <p className="font-black text-xl italic text-[#2D2D2D] truncate uppercase tracking-tighter">
                                                    {item.name}
                                                </p>
                                                <div className="flex gap-3 mt-3">
                                                    {/* 強化後的編輯按鈕 - 任天堂藍 */}
                                                    <button 
                                                        onClick={()=>{setEditingId(item.id); setNewItem({...item}); window.scrollTo({top: 0, behavior: 'smooth'});}} 
                                                        className="bg-[#00A2E8] text-white text-xs font-black px-5 py-2 rounded-full border-b-4 border-black/20 hover:bg-[#0081B9] transition-colors uppercase italic btn-push"
                                                    >
                                                        Edit
                                                    </button>
                                                    {/* 刪除按鈕 - 任天堂紅 */}
                                                    <button 
                                                        onClick={()=> {if(confirm(`確定刪除 [${item.name}]？`)) colRef.doc(item.id).delete()}} 
                                                        className="bg-[#E60012] text-white text-xs font-black px-5 py-2 rounded-full border-b-4 border-black/20 hover:bg-red-700 transition-colors uppercase italic btn-push"
                                                    >
                                                        Del
                                                    </button>
                                                </div>
                                            </div>
                                        </div>
                                    ))}
                                    
                                    {filteredAndSortedData.length === 0 && (
                                        <div className="text-center py-20 bg-slate-50 rounded-[2rem] border-4 border-dashed border-slate-200">
                                            <Icon name="inbox" size={48} className="text-slate-300 mx-auto mb-2" />
                                            <p className="text-slate-400 font-black italic uppercase">Inventory Empty In This Category</p>
                                        </div>
                                    )}
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        // --- 主應用組件 ---

        function App() {
            const [user, setUser] = useState(null);
            const [view, setView] = useState('menu'); 
            const [cardsData, setCardsData] = useState([]);
            const [leaderboard, setLeaderboard] = useState([]);
            const [playerName, setPlayerName] = useState("");
            const [difficulty, setDifficulty] = useState(null);
            
            const [flipCount, setFlipCount] = useState(0);
            const [quizStartTime, setQuizStartTime] = useState(null);
            const [isPaused, setIsPaused] = useState(false);

            const [gameState, setGameState] = useState({ cards: [], flipped: [], matched: [], currentMatchInfo: null, matchedCardsData: [] });
            const [quizState, setQuizState] = useState({ questions: [], currentIndex: 0, score: 0, results: [] });
            const [finalScore, setFinalScore] = useState(0);

            useEffect(() => {
                const init = async () => {
                    try {
                        await auth.signInAnonymously();
                    } catch (err) { console.error("Auth Error:", err); }
                };
                init();
                const unsubscribeAuth = auth.onAuthStateChanged(setUser);
                return () => unsubscribeAuth();
            }, []);

            useEffect(() => {
                if (!user) return;
                const cardsRef = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('deviceCards');
                const unsubCards = cardsRef.onSnapshot(snap => {
                    setCardsData(snap.docs.map(doc => ({ id: doc.id, ...doc.data() })));
                });
                const lbRef = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('leaderboard');
                const unsubLb = lbRef.onSnapshot(snap => {
                    const sorted = snap.docs
                        .map(doc => doc.data())
                        .sort((a, b) => b.score - a.score)
                        .slice(0, 5);
                    setLeaderboard(sorted);
                });
                return () => { unsubCards(); unsubLb(); };
            }, [user]);

            const startGame = (diff) => {
                setDifficulty(diff);
                setFlipCount(0);
                setIsPaused(false);
                let pairsCount = diff === 'easy' ? 8 : (diff === 'medium' ? 12 : 18);
                if (cardsData.length < pairsCount) {
                    alert(`設備資料不足！目前只有 ${cardsData.length} 種，請由管理後台新增。`);
                    return;
                }
                const selectedData = [...cardsData].sort(() => 0.5 - Math.random()).slice(0, pairsCount);
                let cards = [];
                selectedData.forEach((item, index) => {
                    const base = { deviceId: item.id, name: item.name, image: item.image, info: item.info };
                    cards.push({ ...base, instanceId: `${index}-a` });
                    cards.push({ ...base, instanceId: `${index}-b` });
                });
                cards = cards.sort(() => 0.5 - Math.random());
                if (diff === 'medium') cards.splice(12, 0, { isSpacer: true });
                setGameState({ cards, flipped: [], matched: [], currentMatchInfo: null, matchedCardsData: selectedData });
                setView('game');
            };

            const handleCardClick = (index) => {
                if (isPaused) return;
                const { flipped, matched, cards } = gameState;
                if (flipped.length === 2 || matched.includes(index) || flipped.includes(index) || cards[index].isSpacer) return;
                const newFlipped = [...flipped, index];
                setGameState(prev => ({ ...prev, flipped: newFlipped }));
                setFlipCount(prev => prev + 1);
                if (newFlipped.length === 2) {
                    const c1 = cards[newFlipped[0]];
                    const c2 = cards[newFlipped[1]];
                    if (c1.deviceId === c2.deviceId) {
                        setTimeout(() => {
                            setGameState(prev => ({
                                ...prev,
                                matched: [...matched, newFlipped[0], newFlipped[1]],
                                flipped: [],
                                currentMatchInfo: c1
                            }));
                        }, 500);
                    } else {
                        setTimeout(() => setGameState(prev => ({ ...prev, flipped: [] })), 1000);
                    }
                }
            };

            const startQuiz = () => {
                const pool = [...gameState.matchedCardsData].sort(() => 0.5 - Math.random()).slice(0, 5);
                const questions = pool.map(item => ({
                    deviceId: item.id, deviceName: item.name, question: item.question, options: item.options, correct: item.correct
                }));
                setQuizState({ questions, currentIndex: 0, score: 0, results: [] });
                setQuizStartTime(Date.now());
                setView('quiz');
            };

            const submitQuizAnswer = (idx) => {
                const q = quizState.questions[quizState.currentIndex];
                const isCorrect = idx === q.correct;
                const newScore = isCorrect ? quizState.score + 1 : quizState.score;
                const newResults = [...quizState.results, { name: q.deviceName, isCorrect }];
                if (quizState.currentIndex === quizState.questions.length - 1) {
                    const quizEndTime = Date.now();
                    calculateFinalResults(newScore, quizEndTime, newResults);
                } else {
                    setQuizState(prev => ({ ...prev, score: newScore, results: newResults, currentIndex: prev.currentIndex + 1 }));
                }
            };

            const calculateFinalResults = async (quizScore, endTime, results) => {
                const quizDurationSec = (endTime - quizStartTime) / 1000;
                const baseGameScore = difficulty === 'easy' ? 1000 : (difficulty === 'medium' ? 1500 : 2000);
                const perfectFlips = difficulty === 'easy' ? 16 : (difficulty === 'medium' ? 24 : 36);
                const gameScore = Math.max(200, baseGameScore - (flipCount - perfectFlips) * 10);
                const correctPoints = quizScore * 500;
                const speedBonus = Math.max(0, Math.floor((30 - quizDurationSec) * 20));
                const multiplier = difficulty === 'easy' ? 1 : (difficulty === 'medium' ? 1.3 : 1.6);
                const total = Math.floor((gameScore + correctPoints + speedBonus) * multiplier);
                setFinalScore(total);
                setQuizState(prev => ({ ...prev, score: quizScore, results }));
                setView('result');
                if (playerName.trim()) {
                    try {
                        await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('leaderboard').add({
                            name: playerName,
                            score: total,
                            mode: difficulty,
                            timestamp: Date.now()
                        });
                    } catch (e) { console.error("Leaderboard Save Error", e); }
                }
            };

            return (
                <div className="min-h-screen overflow-x-hidden">
                    {view === 'menu' && (
                        <MainMenu 
                            playerName={playerName} 
                            setPlayerName={setPlayerName} 
                            startGame={startGame} 
                            leaderboard={leaderboard} 
                            setView={setView} 
                        />
                    )}
                    {view === 'game' && (
                        <GameBoard 
                            difficulty={difficulty} 
                            playerName={playerName} 
                            setView={setView} 
                            gameState={gameState} 
                            setGameState={setGameState} 
                            handleCardClick={handleCardClick} 
                            flipCount={flipCount} 
                            startQuiz={startQuiz} 
                            isPaused={isPaused}
                            setIsPaused={setIsPaused}
                        />
                    )}
                    {view === 'quiz' && (
                        <QuizView 
                            quizState={quizState} 
                            submitQuizAnswer={submitQuizAnswer} 
                        />
                    )}
                    {view === 'result' && (
                        <ResultView 
                            finalScore={finalScore} 
                            flipCount={flipCount} 
                            quizState={quizState} 
                            setView={setView} 
                        />
                    )}
                    {view === 'admin_login' && (
                        <AdminLogin 
                            setView={setView} 
                        />
                    )}
                    {view === 'admin' && (
                        <AdminView 
                            cardsData={cardsData} 
                            db={db} 
                            appId={appId} 
                            setView={setView} 
                        />
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
